name: Daily Cleanup
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup
        run: |
          curl -X POST https://mw-jobs.vercel.app/api/cleanup \
            -H "X-CLEANUP-SECRET: ${{ secrets.CLEANUP_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}'
